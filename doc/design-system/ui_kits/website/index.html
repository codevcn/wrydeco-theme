<!-- @dsCard group="Website" viewport="1200x800" subtitle="WRYDECO e-commerce gallery experience" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WRYDECO Website</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    * {
      box-sizing: border-box;
    }
    .nav {
      background-color: white;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--color-ebony);
    }
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-links a {
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 200ms;
      cursor: pointer;
    }
    .nav-links a:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">WRYDECO</div>
    <ul class="nav-links">
      <li><a onclick="document.querySelector('[data-section=hero]').scrollIntoView({behavior:'smooth'})">Home</a></li>
      <li><a onclick="document.querySelector('[data-section=gallery]').scrollIntoView({behavior:'smooth'})">Shop</a></li>
      <li><a onclick="document.querySelector('[data-section=detail]').scrollIntoView({behavior:'smooth'})">Products</a></li>
      <li><a>About</a></li>
      <li><a>Contact</a></li>
    </ul>
  </nav>

  <div id="root"></div>

  <script type="text/babel">
    // Hero Component
    function Hero() {
      return (
        <section data-section="hero" style={{
          paddingTop: 'var(--sp-8)',
          paddingBottom: 'var(--sp-8)',
          paddingLeft: 'var(--layout-padding-desktop)',
          paddingRight: 'var(--layout-padding-desktop)',
          textAlign: 'center',
          backgroundColor: 'var(--bg-primary)',
          borderBottom: '1px solid var(--border-light)',
        }}>
          <h1 style={{
            fontSize: 'var(--font-size-display-lg)',
            marginBottom: 'var(--sp-4)',
            color: 'var(--text-primary)',
          }}>
            Handcrafted Elegance
          </h1>
          <p style={{
            fontSize: 'var(--font-size-body-lg)',
            color: 'var(--text-secondary)',
            maxWidth: '600px',
            marginLeft: 'auto',
            marginRight: 'auto',
            marginBottom: 'var(--sp-6)',
            lineHeight: 'var(--line-height-generous)',
          }}>
            Discover our curated collection of premium artisan furniture and home décor. Each piece is handcrafted with care and made from sustainably sourced materials.
          </p>
          <button style={{
            padding: '16px 28px',
            fontSize: '16px',
            fontWeight: '600',
            border: 'none',
            borderRadius: 'var(--radius-sm)',
            backgroundColor: 'var(--color-ebony)',
            color: 'white',
            cursor: 'pointer',
            transition: 'all var(--duration-short) var(--ease-standard)',
          }}
          onMouseEnter={(e) => {
            e.target.style.backgroundColor = 'var(--color-bark)';
            e.target.style.boxShadow = 'var(--shadow-elevation-2)';
          }}
          onMouseLeave={(e) => {
            e.target.style.backgroundColor = 'var(--color-ebony)';
            e.target.style.boxShadow = 'none';
          }}>
            Explore Collection
          </button>
        </section>
      );
    }

    // Product Gallery Component
    function ProductGallery() {
      const products = [
        { id: 1, name: 'Walnut Shelf', price: '$1,200', image: '🪑' },
        { id: 2, name: 'Oak Bench', price: '$1,800', image: '🛋️' },
        { id: 3, name: 'Maple Cabinet', price: '$2,400', image: '📦' },
        { id: 4, name: 'Cherry Table', price: '$2,800', image: '📋' },
      ];

      return (
        <section data-section="gallery" style={{
          padding: 'var(--sp-8) var(--layout-padding-desktop)',
          backgroundColor: 'white',
        }}>
          <h2 style={{
            fontSize: 'var(--font-size-display-md)',
            marginBottom: 'var(--sp-6)',
            color: 'var(--text-primary)',
          }}>
            Featured Collection
          </h2>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))',
            gap: 'var(--sp-5)',
          }}>
            {products.map((product) => (
              <div
                key={product.id}
                style={{
                  backgroundColor: 'var(--color-cream)',
                  borderRadius: 'var(--radius-sm)',
                  overflow: 'hidden',
                  boxShadow: 'var(--shadow-elevation-1)',
                  cursor: 'pointer',
                  transition: 'all var(--duration-short) var(--ease-standard)',
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.boxShadow = 'var(--shadow-elevation-2)';
                  e.currentTarget.style.transform = 'translateY(-2px)';
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.boxShadow = 'var(--shadow-elevation-1)';
                  e.currentTarget.style.transform = 'translateY(0)';
                }}
              >
                <div style={{
                  fontSize: '64px',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  height: '200px',
                  backgroundColor: 'var(--bg-secondary)',
                }}>
                  {product.image}
                </div>
                <div style={{ padding: 'var(--sp-5)' }}>
                  <h3 style={{
                    fontSize: 'var(--font-size-body-lg)',
                    marginBottom: 'var(--sp-2)',
                    color: 'var(--text-primary)',
                  }}>
                    {product.name}
                  </h3>
                  <p style={{
                    fontSize: 'var(--font-size-body-md)',
                    color: 'var(--text-secondary)',
                    marginBottom: 'var(--sp-3)',
                  }}>
                    {product.price}
                  </p>
                  <button style={{
                    width: '100%',
                    padding: '12px 16px',
                    border: '1px solid var(--color-linen)',
                    backgroundColor: 'transparent',
                    color: 'var(--text-primary)',
                    borderRadius: 'var(--radius-sm)',
                    cursor: 'pointer',
                    fontSize: '14px',
                    fontWeight: '600',
                    transition: 'all var(--duration-short) var(--ease-standard)',
                  }}
                  onMouseEnter={(e) => {
                    e.target.style.borderColor = 'var(--color-bark)';
                    e.target.style.color = 'var(--color-bark)';
                  }}
                  onMouseLeave={(e) => {
                    e.target.style.borderColor = 'var(--color-linen)';
                    e.target.style.color = 'var(--text-primary)';
                  }}>
                    View Details
                  </button>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    // Footer Component
    function Footer() {
      return (
        <footer style={{
          backgroundColor: 'var(--color-ebony)',
          color: 'white',
          padding: 'var(--sp-8) var(--layout-padding-desktop)',
          borderTop: '1px solid var(--border-dark)',
        }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(4, 1fr)',
            gap: 'var(--sp-6)',
            marginBottom: 'var(--sp-8)',
            maxWidth: '1200px',
          }}>
            <div>
              <h4 style={{ fontSize: '14px', fontWeight: '600', marginBottom: 'var(--sp-3)' }}>Shop</h4>
              <ul style={{ listStyle: 'none', padding: 0 }}>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Furniture</a></li>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Collections</a></li>
                <li><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>New Arrivals</a></li>
              </ul>
            </div>
            <div>
              <h4 style={{ fontSize: '14px', fontWeight: '600', marginBottom: 'var(--sp-3)' }}>About</h4>
              <ul style={{ listStyle: 'none', padding: 0 }}>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Our Story</a></li>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Sustainability</a></li>
                <li><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Artisans</a></li>
              </ul>
            </div>
            <div>
              <h4 style={{ fontSize: '14px', fontWeight: '600', marginBottom: 'var(--sp-3)' }}>Support</h4>
              <ul style={{ listStyle: 'none', padding: 0 }}>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Contact</a></li>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Shipping</a></li>
                <li><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Returns</a></li>
              </ul>
            </div>
            <div>
              <h4 style={{ fontSize: '14px', fontWeight: '600', marginBottom: 'var(--sp-3)' }}>Connect</h4>
              <ul style={{ listStyle: 'none', padding: 0 }}>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Instagram</a></li>
                <li style={{ marginBottom: 'var(--sp-2)' }}><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>LinkedIn</a></li>
                <li><a href="#" style={{ color: 'rgba(255,255,255,0.8)', textDecoration: 'none', fontSize: '13px' }}>Newsletter</a></li>
              </ul>
            </div>
          </div>
          <div style={{
            borderTop: '1px solid rgba(255,255,255,0.1)',
            paddingTop: 'var(--sp-5)',
            textAlign: 'center',
            fontSize: '12px',
            color: 'rgba(255,255,255,0.6)',
          }}>
            <p style={{ margin: 0 }}>© 2024 WRYDECO. All rights reserved. Handcrafted with care.</p>
          </div>
        </footer>
      );
    }

    // Main App
    function App() {
      return (
        <>
          <Hero />
          <ProductGallery />
          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
