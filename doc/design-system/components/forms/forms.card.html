<!-- @dsCard group="Components" viewport="700x480" name="Form Components" subtitle="Button, Input, Badge" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Components</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="../../_ds_bundle.js"></script>
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .component-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="section">
    <span class="section-label">Buttons</span>
    <div class="component-row">
      <button style="padding: 12px 20px; font-weight: 600; border: none; border-radius: 2px; background-color: var(--color-ebony); color: white; cursor: pointer; font-size: 14px;">Primary</button>
      <button style="padding: 12px 20px; font-weight: 600; border: none; border-radius: 2px; background-color: var(--color-stone); color: var(--color-ebony); cursor: pointer; font-size: 14px;">Secondary</button>
      <button style="padding: 12px 20px; font-weight: 600; border: 1px solid var(--color-linen); border-radius: 2px; background-color: transparent; color: var(--color-ebony); cursor: pointer; font-size: 14px;">Ghost</button>
      <button style="padding: 12px 20px; font-weight: 600; border: none; border-radius: 2px; background-color: var(--color-stone); color: var(--color-linen); cursor: not-allowed; font-size: 14px; opacity: 0.5;">Disabled</button>
    </div>
  </div>

  <div class="section">
    <span class="section-label">Input Fields</span>
    <div style="display: flex; flex-direction: column; gap: 8px; max-width: 300px;">
      <input type="text" placeholder="Email address" style="padding: 12px 16px; border: 1px solid var(--border-default); border-radius: 2px; font-family: var(--font-body); font-size: 14px;">
      <input type="text" placeholder="Name" style="padding: 12px 16px; border: 1px solid var(--color-error); border-radius: 2px; font-family: var(--font-body); font-size: 14px;">
      <input type="text" placeholder="Disabled input" disabled style="padding: 12px 16px; border: 1px solid var(--border-default); border-radius: 2px; font-family: var(--font-body); font-size: 14px; background-color: var(--bg-disabled); color: var(--text-disabled);">
    </div>
  </div>

  <div class="section">
    <span class="section-label">Badges</span>
    <div class="component-row">
      <span style="display: inline-flex; align-items: center; padding: 6px 12px; background-color: var(--color-stone); color: var(--text-primary); border-radius: 9999px; font-size: 12px; font-weight: 600;">Default</span>
      <span style="display: inline-flex; align-items: center; padding: 6px 12px; background-color: var(--color-sage); color: white; border-radius: 9999px; font-size: 12px; font-weight: 600;">Success</span>
      <span style="display: inline-flex; align-items: center; padding: 6px 12px; background-color: var(--color-warning); color: white; border-radius: 9999px; font-size: 12px; font-weight: 600;">Warning</span>
      <span style="display: inline-flex; align-items: center; padding: 6px 12px; background-color: var(--color-error); color: white; border-radius: 9999px; font-size: 12px; font-weight: 600;">Error</span>
    </div>
  </div>
</body>
</html>
