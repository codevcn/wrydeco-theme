<!-- @dsCard group="Components" viewport="700x200" name="Layout Components" subtitle="Divider for separating content" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Components</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .divider {
      height: 1px;
      background-color: var(--border-light);
    }
  </style>
</head>
<body>
  <div class="section">
    <span class="section-label">Horizontal Divider</span>
    <div style="padding: 8px 0;">Item 1</div>
    <div class="divider"></div>
    <div style="padding: 8px 0;">Item 2</div>
    <div class="divider"></div>
    <div style="padding: 8px 0;">Item 3</div>
  </div>

  <div class="section">
    <span class="section-label">Divider in Layout</span>
    <div style="display: flex; gap: 16px;">
      <div style="flex: 1;">Left column</div>
      <div style="width: 1px; background-color: var(--border-light);"></div>
      <div style="flex: 1;">Right column</div>
    </div>
  </div>
</body>
</html>
