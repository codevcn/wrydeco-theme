<!-- @dsCard group="Components" viewport="700x200" name="Feedback Components" subtitle="Badge for status and tags" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Components</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-default { background-color: var(--color-stone); color: var(--text-primary); }
    .badge-success { background-color: var(--color-sage); color: white; }
    .badge-warning { background-color: var(--color-warning); color: white; }
    .badge-error { background-color: var(--color-error); color: white; }
    .badge-accent { background-color: var(--color-clay); color: white; }
  </style>
</head>
<body>
  <div class="section">
    <span class="section-label">Badges</span>
    <div class="badge-row">
      <span class="badge badge-default">Default</span>
      <span class="badge badge-success">Success</span>
      <span class="badge badge-warning">Warning</span>
      <span class="badge badge-error">Error</span>
      <span class="badge badge-accent">Accent</span>
    </div>
  </div>
  <div class="section">
    <span class="section-label">Sizes</span>
    <div class="badge-row">
      <span class="badge badge-success" style="padding: 4px 8px; font-size: 11px;">Small</span>
      <span class="badge badge-success" style="padding: 6px 12px; font-size: 12px;">Medium</span>
      <span class="badge badge-success" style="padding: 8px 16px; font-size: 13px;">Large</span>
    </div>
  </div>
</body>
</html>
