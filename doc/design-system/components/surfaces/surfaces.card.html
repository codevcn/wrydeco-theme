<!-- @dsCard group="Components" viewport="700x300" name="Surface Components" subtitle="Card, Divider" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surface Components</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      background-color: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card {
      background-color: var(--color-cream);
      border-radius: 2px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(26, 24, 21, 0.08);
    }
    .card.elevated {
      background-color: white;
      box-shadow: 0 4px 16px rgba(26, 24, 21, 0.12);
    }
    .divider {
      height: 1px;
      background-color: var(--border-light);
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="section">
    <span class="section-label">Cards</span>
    <div class="card">
      <h4 style="margin: 0 0 8px 0; font-size: 16px;">Default Card</h4>
      <p style="margin: 0; font-size: 14px; color: var(--text-secondary);">Cream background with elevation 1 shadow</p>
    </div>
    <div class="card elevated">
      <h4 style="margin: 0 0 8px 0; font-size: 16px;">Elevated Card</h4>
      <p style="margin: 0; font-size: 14px; color: var(--text-secondary);">White background with elevation 2 shadow</p>
    </div>
  </div>

  <div class="section">
    <span class="section-label">Dividers</span>
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="padding: 8px 0;">Item 1</div>
      <div class="divider"></div>
      <div style="padding: 8px 0;">Item 2</div>
      <div class="divider"></div>
      <div style="padding: 8px 0;">Item 3</div>
    </div>
  </div>
</body>
</html>
