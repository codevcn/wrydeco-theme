<!-- @dsCard group="Shadows" viewport="700x240" name="Elevation & Shadows" subtitle="Shadow system for cards, modals, and interactive elements" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevation & Shadows</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      background-color: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .shadow-demo {
      padding: 20px;
      background-color: white;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      font-size: 14px;
      font-weight: 500;
    }
    .el1 { box-shadow: 0 2px 8px rgba(26, 24, 21, 0.08); }
    .el2 { box-shadow: 0 4px 16px rgba(26, 24, 21, 0.12); }
    .el3 { box-shadow: 0 8px 24px rgba(26, 24, 21, 0.15); }
    .el4 { box-shadow: 0 16px 40px rgba(26, 24, 21, 0.2); }
  </style>
</head>
<body>
  <div class="shadow-demo el1">Elevation 1 (Cards)</div>
  <div class="shadow-demo el2">Elevation 2 (Hover, Elevated Cards)</div>
  <div class="shadow-demo el3">Elevation 3 (Dropdowns, Popovers)</div>
  <div class="shadow-demo el4">Elevation 4 (Modals, Fullscreen)</div>
</body>
</html>
