<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Colors</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .state {
      padding: 16px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
    }
    .success { background-color: #7a8968; color: white; }
    .warning { background-color: #c9913d; color: white; }
    .error { background-color: #b85c5c; color: white; }
    .info { background-color: #7a8968; color: white; }
  </style>
</head>
<body>
  <div class="state success">Success</div>
  <div class="state warning">Warning</div>
  <div class="state error">Error</div>
  <div class="state info">Info</div>
</body>
</html>
