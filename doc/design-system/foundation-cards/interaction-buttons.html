<!-- @dsCard group="Interaction" viewport="700x220" name="Button States" subtitle="Primary, hover, active, disabled, and focus states" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button States</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .btn {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
    }
    .primary {
      background-color: var(--color-ebony);
      color: white;
    }
    .primary:hover {
      background-color: var(--color-bark);
      box-shadow: 0 4px 16px rgba(26, 24, 21, 0.12);
    }
    .secondary {
      background-color: var(--color-stone);
      color: var(--color-ebony);
    }
    .secondary:hover {
      background-color: var(--color-linen);
    }
    .disabled {
      background-color: var(--color-stone);
      color: var(--color-linen);
      cursor: not-allowed;
      opacity: 0.5;
    }
    .ghost {
      background-color: transparent;
      color: var(--color-ebony);
      border: 1px solid var(--color-linen);
    }
    .ghost:hover {
      border-color: var(--color-bark);
      color: var(--color-bark);
    }
  </style>
</head>
<body>
  <button class="btn primary">Primary Default</button>
  <button class="btn secondary">Secondary Default</button>
  <button class="btn primary" style="background-color: var(--color-bark); box-shadow: 0 4px 16px rgba(26, 24, 21, 0.12);">Primary Hover</button>
  <button class="btn secondary" style="background-color: var(--color-linen);">Secondary Hover</button>
  <button class="btn ghost">Ghost Default</button>
  <button class="btn ghost" style="border-color: var(--color-bark); color: var(--color-bark);">Ghost Hover</button>
  <button class="btn primary disabled" style="opacity: 0.5; cursor: not-allowed;">Primary Disabled</button>
  <button class="btn secondary disabled" style="opacity: 0.5; cursor: not-allowed;">Secondary Disabled</button>
</body>
</html>
