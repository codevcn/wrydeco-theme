<!-- @dsCard group="Motion" viewport="700x200" name="Animation Durations" subtitle="Easing and timing for interactions" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Durations</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .duration-demo {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .label {
      font-size: 12px;
      font-weight: 600;
      min-width: 100px;
    }
    .box {
      width: 40px;
      height: 40px;
      background-color: var(--color-clay);
      border-radius: 4px;
      transition: transform var(--ease-standard);
    }
    .duration-demo:hover .box {
      transform: translateX(20px);
    }
    .micro { transition-duration: 150ms; }
    .short { transition-duration: 200ms; }
    .base { transition-duration: 300ms; }
    .long { transition-duration: 400ms; }
  </style>
</head>
<body>
  <div class="duration-demo">
    <span class="label">Micro (150ms)</span>
    <div class="box micro"></div>
  </div>
  <div class="duration-demo">
    <span class="label">Short (200ms)</span>
    <div class="box short"></div>
  </div>
  <div class="duration-demo">
    <span class="label">Base (300ms)</span>
    <div class="box base"></div>
  </div>
  <div class="duration-demo">
    <span class="label">Long (400ms)</span>
    <div class="box long"></div>
  </div>
</body>
</html>
