<!-- @dsCard group="Typography" viewport="700x280" name="Display Type" subtitle="Headlines and display text (Fraunces)" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Type</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .specimen {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .size-label {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .display-lg {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }
    .display-md {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }
    .display-sm {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="specimen">
    <span class="size-label">Display Large - 48px</span>
    <div class="display-lg">Handcrafted Elegance</div>
  </div>
  <div class="specimen">
    <span class="size-label">Display Medium - 36px</span>
    <div class="display-md">Premium Collection</div>
  </div>
  <div class="specimen">
    <span class="size-label">Display Small - 28px</span>
    <div class="display-sm">Artisan Details</div>
  </div>
</body>
</html>
