<!-- @dsCard group="Shadows" viewport="700x140" name="Border Radius" subtitle="Restrained corner rounding (premium aesthetic)" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Radius</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .radius-demo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .box {
      width: 60px;
      height: 60px;
      background-color: var(--color-sage);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .label {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      width: 60px;
    }
  </style>
</head>
<body>
  <div class="radius-demo">
    <div class="box" style="border-radius: 0px;"></div>
    <span class="label">None (0)</span>
  </div>
  <div class="radius-demo">
    <div class="box" style="border-radius: 2px;"></div>
    <span class="label">Small (2px)</span>
  </div>
  <div class="radius-demo">
    <div class="box" style="border-radius: 4px;"></div>
    <span class="label">Medium (4px)</span>
  </div>
  <div class="radius-demo">
    <div class="box" style="border-radius: 8px;"></div>
    <span class="label">Large (8px)</span>
  </div>
</body>
</html>
