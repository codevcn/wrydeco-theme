<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="Consistent spacing tokens from 4px to 64px" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spacing Scale</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .token-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .token-label {
      font-size: 12px;
      font-weight: 600;
      min-width: 60px;
      text-align: right;
    }
    .token-bar {
      background-color: var(--color-clay);
      height: 16px;
      border-radius: 2px;
    }
    .token-value {
      font-size: 12px;
      color: var(--text-tertiary);
      min-width: 40px;
    }
  </style>
</head>
<body>
  <div class="token-row">
    <span class="token-label">--sp-1</span>
    <div class="token-bar" style="width: 40px;"></div>
    <span class="token-value">4px</span>
  </div>
  <div class="token-row">
    <span class="token-label">--sp-2</span>
    <div class="token-bar" style="width: 80px;"></div>
    <span class="token-value">8px</span>
  </div>
  <div class="token-row">
    <span class="token-label">--sp-4</span>
    <div class="token-bar" style="width: 160px;"></div>
    <span class="token-value">16px</span>
  </div>
  <div class="token-row">
    <span class="token-label">--sp-5</span>
    <div class="token-bar" style="width: 240px;"></div>
    <span class="token-value">24px</span>
  </div>
  <div class="token-row">
    <span class="token-label">--sp-6</span>
    <div class="token-bar" style="width: 320px;"></div>
    <span class="token-value">32px</span>
  </div>
</body>
</html>
