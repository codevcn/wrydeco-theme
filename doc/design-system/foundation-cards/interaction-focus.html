<!-- @dsCard group="Interaction" viewport="700x220" name="Focus States" subtitle="Keyboard navigation and accessibility" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus States</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .focus-demo {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .demo-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }
    input, a {
      padding: 12px 16px;
      font-size: 14px;
      border: 1px solid var(--color-linen);
      border-radius: 2px;
      outline: none;
    }
    input:focus, a:focus {
      outline: 2px solid var(--color-sage);
      outline-offset: 2px;
      border-color: var(--color-sage);
    }
  </style>
</head>
<body>
  <div class="focus-demo">
    <span class="demo-label">Input Focus (Tab to focus)</span>
    <input type="text" placeholder="Click or tab to focus" autofocus>
  </div>
  <div class="focus-demo">
    <span class="demo-label">Link Focus (Tab to focus)</span>
    <a href="#" style="display: inline-block;">Focusable link element</a>
  </div>
  <div class="focus-demo" style="color: var(--text-tertiary); font-size: 12px;">
    Focus indicator: 2px solid sage outline with 2px offset
  </div>
</body>
</html>
