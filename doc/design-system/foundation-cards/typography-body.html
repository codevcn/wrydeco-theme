<!-- @dsCard group="Typography" viewport="700x280" name="Body Type" subtitle="Body copy and UI text (Plus Jakarta Sans)" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Type</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .specimen {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .size-label {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .body-lg {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.6;
      font-family: var(--font-body);
    }
    .body-md {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      font-family: var(--font-body);
    }
    .body-sm {
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      font-family: var(--font-body);
    }
  </style>
</head>
<body>
  <div class="specimen">
    <span class="size-label">Body Large - 18px</span>
    <div class="body-lg">Each piece is carefully selected and handcrafted with attention to detail.</div>
  </div>
  <div class="specimen">
    <span class="size-label">Body Regular - 16px</span>
    <div class="body-md">Discover our curated collection of artisan furniture and home décor pieces.</div>
  </div>
  <div class="specimen">
    <span class="size-label">Body Small - 14px</span>
    <div class="body-sm">Made from sustainably sourced materials with expert craftsmanship.</div>
  </div>
</body>
</html>
