<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Announcement Bar Fixture</title>
    <style>
      /* Design tokens mirrored from assets/base.css */
      :root {
        --color-earth-brown: #4a2c18;
        --color-milk: #f7f2ec;
        --font-primary--family: 'Plus Jakarta Sans', Arial, sans-serif;
        --text-xs: 12px;
        --space-1: 4px;
        --space-2: 6px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f5f1ea; }

      /* --- copied verbatim from sections/announcement-bar.liquid {% stylesheet %} --- */
      .wd-topbar {
        display: block;
        width: 100%;
        overflow: hidden;
        background-color: var(--color-earth-brown, #4a2c18);
        color: var(--color-milk, #f7f2ec);
        font-family: var(--font-primary--family, sans-serif);
      }
      .wd-topbar__viewport { width: 100%; overflow: hidden; }
      .wd-topbar__track {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding-block: var(--space-1, 4px);
      }
      .wd-topbar__group {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        white-space: nowrap;
        padding-block: var(--space-2, 6px);
        font-size: var(--text-xs, 12px);
        line-height: 1.2;
        letter-spacing: 0.08em;
      }
      .wd-topbar__group > * {
        width: auto !important;
        max-width: none !important;
        margin: 0 !important;
        background: transparent !important;
      }
      @media (max-width: 749px) {
        .wd-topbar__group { font-size: var(--text-xs, 11px); letter-spacing: 0.05em; }
      }
    </style>
  </head>
  <body>
    <!-- Represents the metaobject html_message injected server-side into .wd-topbar__group -->
    <wd-announcement-bar class="wd-topbar" role="region" aria-label="Announcement">
      <div class="wd-topbar__viewport">
        <div class="wd-topbar__track">
          <div class="wd-topbar__group"><div style="width:100%; background:#5a321e; color:#ffffff; box-sizing:border-box; display:flex; align-items:center; justify-content:center; gap:32px; padding:10px 24px; font-size:12px; letter-spacing:0.08em;"><span>Free US Shipping</span><span>&bull;</span><span>Handcrafted to Order</span><span>&bull;</span><span>White-Glove Delivery</span></div></div>
        </div>
      </div>
    </wd-announcement-bar>

    <div style="height:1200px"></div>
  </body>
</html>
