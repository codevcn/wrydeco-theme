<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wooden Button</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.035), transparent 35%), #17120f;
        font-family: Arial, Helvetica, sans-serif;
      }

      button {
        position: relative;
        isolation: isolate;
        min-width: 260px;
        padding: 20px 42px;
        overflow: hidden;
        border: 1px solid #3b1d0d;
        border-radius: 10px;
        color: #fff;
        font:
          700 14px/1 Arial,
          Helvetica,
          sans-serif;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-shadow:
          0 1px 0 rgba(0, 0, 0, 0.8),
          0 2px 5px rgba(0, 0, 0, 0.55);
        background:
          repeating-linear-gradient(
            88deg,
            rgba(255, 255, 255, 0.025) 0 1px,
            rgba(34, 13, 4, 0.08) 1px 3px,
            transparent 3px 8px
          ),
          repeating-linear-gradient(
            96deg,
            transparent 0 14px,
            rgba(39, 14, 5, 0.18) 14px 18px,
            rgba(255, 202, 132, 0.06) 18px 21px,
            transparent 21px 36px
          ),
          linear-gradient(180deg, #b56c31 0%, #8e4b21 16%, #6e3517 48%, #4c220f 73%, #3b180b 100%);
        box-shadow:
          inset 0 2px 0 rgba(255, 220, 170, 0.25),
          inset 0 -5px 0 rgba(37, 14, 5, 0.42),
          inset 0 0 0 2px rgba(255, 181, 103, 0.08),
          0 8px 0 #241006,
          0 12px 22px rgba(0, 0, 0, 0.45);
        cursor: pointer;
        transform: translateY(0);
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          filter 160ms ease;
      }

      button::before {
        content: "";
        position: absolute;
        inset: 4px;
        z-index: -1;
        border: 1px solid rgba(255, 216, 158, 0.22);
        border-radius: 7px;
        background:
          radial-gradient(
            ellipse at 18% 45%,
            transparent 0 10%,
            rgba(45, 17, 5, 0.28) 11% 13%,
            transparent 14% 21%,
            rgba(255, 205, 137, 0.07) 22% 24%,
            transparent 25%
          ),
          radial-gradient(
            ellipse at 76% 60%,
            transparent 0 8%,
            rgba(39, 14, 4, 0.25) 9% 11%,
            transparent 12% 19%,
            rgba(255, 205, 137, 0.06) 20% 22%,
            transparent 23%
          );
        opacity: 0.85;
        pointer-events: none;
      }

      button::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: linear-gradient(
          105deg,
          transparent 0 38%,
          rgba(255, 255, 255, 0.12) 46%,
          transparent 54%
        );
        transform: translateX(-130%);
        transition: transform 500ms ease;
        pointer-events: none;
      }

      button:hover {
        filter: saturate(1.08) brightness(1.06);
        transform: translateY(-2px);
        box-shadow:
          inset 0 2px 0 rgba(255, 220, 170, 0.28),
          inset 0 -5px 0 rgba(37, 14, 5, 0.42),
          inset 0 0 0 2px rgba(255, 181, 103, 0.1),
          0 10px 0 #241006,
          0 16px 26px rgba(0, 0, 0, 0.5);
      }

      button:hover::after {
        transform: translateX(130%);
      }

      button:active {
        transform: translateY(6px);
        box-shadow:
          inset 0 2px 0 rgba(255, 220, 170, 0.18),
          inset 0 -3px 0 rgba(37, 14, 5, 0.45),
          0 2px 0 #241006,
          0 6px 12px rgba(0, 0, 0, 0.4);
      }

      button:focus-visible {
        outline: 3px solid rgba(235, 178, 106, 0.72);
        outline-offset: 5px;
      }
    </style>
  </head>
  <body>
    <button type="button">Continue</button>
  </body>
</html>
